name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Backend: install & test
        working-directory: backend
        run: |
          npm ci
          npm run test
      - name: Frontend: install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
